      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>WV Control Center</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <body>
    <div id="root"></div>
    <script>
      // Disable Vite HMR client to prevent WebSocket connection errors
      window.__VITE_HMR_DISABLED__ = true;
      if (window.location.search.includes('from_webdev')) {
        // Disable HMR for webdev preview
        window.__VITE_HMR_PROTOCOL__ = null;
        window.__VITE_HMR_HOSTNAME__ = null;
        window.__VITE_HMR_PORT__ = null;
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
